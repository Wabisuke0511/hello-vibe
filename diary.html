<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日のひとこと記録</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
      color: #333;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 24px;
    }

    .input-area {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      padding: 10px 18px;
      font-size: 1rem;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #357abd;
    }

    .records {
      margin-top: 32px;
    }

    .record-item {
      background: white;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 10px;
      border-left: 4px solid #4a90d9;
    }

    .record-date {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 4px;
    }

    .record-text {
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <h1>今日のひとこと記録</h1>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="今日のひとことを入力..." />
    <button onclick="addRecord()">記録する</button>
  </div>

  <div class="records" id="records"></div>

  <script>
    function today() {
      const d = new Date();
      return d.getFullYear() + "年" +
             (d.getMonth() + 1) + "月" +
             d.getDate() + "日";
    }

    function addRecord() {
      const input = document.getElementById("messageInput");
      const text = input.value.trim();

      if (text === "") return; // 空欄なら何もしない

      // 記録カードを作る
      const item = document.createElement("div");
      item.className = "record-item";
      item.innerHTML = `
        <div class="record-date">${today()}</div>
        <div class="record-text">${text}</div>
      `;

      // 画面の記録一覧の先頭に追加する
      const records = document.getElementById("records");
      records.prepend(item);

      input.value = ""; // 入力欄をクリア
      input.focus();    // カーソルを入力欄に戻す
    }

    // Enterキーでも記録できるようにする
    document.getElementById("messageInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") addRecord();
    });
  </script>
</body>
</html>
