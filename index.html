<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello, VibeCoding!</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #808080;
    }
    h1 {
      font-size: 4rem;
      color: #ffffff;
      text-align: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }
    button {
      font-size: 1.25rem;
      padding: 0.6rem 2rem;
      border: none;
      border-radius: 8px;
      background: #e0e0e0;
      color: #333;
      cursor: pointer;
    }
    button:hover {
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, VibeCoding!</h1>
    <button onclick="window.close()">Close</button>
  </div>
</body>
</html>
